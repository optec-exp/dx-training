<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>教育訓練カレンダー | OPTEC EXPRESS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#0d9488;
  --accent-lt:#2dd4bf;
  --accent-bg:#f0fdfa;
  --bg:#f0f4f8;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#0f172a;
  --text-mid:#475569;
  --text-dim:#94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column}

.site-head{background:var(--card);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-size:.72rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase}
.logo em{color:var(--accent);font-style:normal}
.head-title{font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--accent-bg);padding:4px 12px;border-radius:20px}

.main{flex:1;display:grid;grid-template-columns:1fr 300px;gap:0;max-height:calc(100vh - 57px);overflow:hidden}

.cal-panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}

.cal-nav{background:var(--card);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.nav-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:.95rem;color:var(--text-mid);display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:hover{background:var(--accent-bg);border-color:var(--accent-lt);color:var(--accent)}
.nav-center{display:flex;align-items:center;gap:12px}
.month-label{font-size:1.25rem;font-weight:800;letter-spacing:-.02em}
.today-btn{padding:6px 16px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:opacity .15s}
.today-btn:hover{opacity:.85}

.cal-grid{flex:1;overflow-y:auto}
.week-header{display:grid;grid-template-columns:repeat(7,1fr);background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.wh-cell{padding:8px 0;text-align:center;font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim)}
.wh-cell:first-child{color:#ef4444}
.wh-cell:last-child{color:#6366f1}
.days{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(88px,1fr)}
.day{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px 7px;cursor:pointer;transition:background .12s;position:relative;background:var(--card);display:flex;flex-direction:column;gap:3px}
.day:nth-child(7n){border-right:none}
.day:hover{background:#f0fdfa}
.day.other-month{background:#f8f9fa}
.day.other-month .day-num{color:var(--text-dim)}
.day.selected{background:var(--accent-bg)!important;outline:2px solid var(--accent);outline-offset:-2px}
.day-num{font-size:.78rem;font-weight:700;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;color:var(--text-mid)}
.day:nth-child(7n+1) .day-num{color:#ef4444}
.day:nth-child(7n) .day-num{color:#6366f1}
.day.today .day-num{background:var(--accent);color:#fff}
.event-chip{font-size:.58rem;font-weight:600;padding:2px 5px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.more-chip{font-size:.56rem;color:var(--text-dim);padding:1px 4px;font-weight:500}
.add-day-btn{position:absolute;bottom:4px;right:5px;width:18px;height:18px;border-radius:4px;background:transparent;border:none;color:var(--text-dim);font-size:.9rem;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;transition:all .15s}
.day:hover .add-day-btn{display:flex}
.add-day-btn:hover{color:var(--accent);background:var(--accent-bg)}

.sidebar{background:var(--card);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-date{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.sb-day-name{font-size:1.1rem;font-weight:800}
.sb-events{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.no-events{display:flex;flex-direction:column;align-items:center;justify-content:center;height:120px;color:var(--text-dim);font-size:.78rem;text-align:center;gap:8px}
.no-events-icon{font-size:1.8rem;opacity:.4}
.ev-card{border-radius:10px;padding:10px 12px;position:relative;border:1px solid transparent}
.ev-title{font-size:.82rem;font-weight:700;margin-bottom:3px;line-height:1.35}
.ev-type{font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:.7}
.ev-del{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:5px;border:none;background:rgba(0,0,0,.08);cursor:pointer;font-size:.72rem;color:inherit;opacity:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.ev-card:hover .ev-del{opacity:1}
.ev-del:hover{background:rgba(239,68,68,.2);color:#b91c1c}
.add-ev-btn{margin:0 16px 16px;padding:10px;background:var(--accent-bg);border:1.5px dashed var(--accent-lt);border-radius:10px;color:var(--accent);font-family:'Inter',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.04em;flex-shrink:0}
.add-ev-btn:hover{background:var(--accent);color:#fff;border-style:solid}

.legend{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.legend-title{font-size:.58rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:3px}
.leg-item{display:flex;align-items:center;gap:8px;font-size:.66rem;color:var(--text-mid)}
.leg-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}

.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:16px;width:360px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.18);overflow:hidden}
.modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:.95rem;font-weight:800}
.modal-close{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:1rem;color:var(--text-dim);display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:18px 20px}
.form-group{margin-bottom:14px}
.form-label{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-mid);display:block;margin-bottom:5px}
.form-input,.form-select{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:.82rem;color:var(--text);background:var(--card);outline:none;transition:border-color .15s}
.form-input:focus,.form-select:focus{border-color:var(--accent)}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.btn-cancel{padding:8px 18px;border:1px solid var(--border);border-radius:8px;background:transparent;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;color:var(--text-mid);cursor:pointer}
.btn-cancel:hover{background:var(--bg)}
.btn-save{padding:8px 20px;background:var(--accent);border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:700;color:#fff;cursor:pointer;transition:opacity .15s}
.btn-save:hover{opacity:.88}

.et-training{background:#e0f2fe;border-color:#bae6fd;color:#0369a1}
.et-audit{background:#ffedd5;border-color:#fed7aa;color:#c2410c}
.et-drill{background:#dcfce7;border-color:#bbf7d0;color:#15803d}
.et-meeting{background:#ede9fe;border-color:#ddd6fe;color:#5b21b6}
</style>
</head>
<body>

<header class="site-head">
  <div class="logo">OPTEC <em>EXPRESS</em></div>
  <div class="head-title">教育訓練カレンダー</div>
</header>

<div class="main">
  <div class="cal-panel">
    <div class="cal-nav">
      <button class="nav-btn" id="prevBtn">&#8249;</button>
      <div class="nav-center">
        <span class="month-label" id="monthLabel"></span>
        <button class="today-btn" id="todayBtn">Today</button>
      </div>
      <button class="nav-btn" id="nextBtn">&#8250;</button>
    </div>
    <div class="cal-grid">
      <div class="week-header">
        <div class="wh-cell">月</div><div class="wh-cell">火</div><div class="wh-cell">水</div>
        <div class="wh-cell">木</div><div class="wh-cell">金</div><div class="wh-cell">土</div><div class="wh-cell">日</div>
      </div>
      <div class="days" id="daysGrid"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-date" id="sbDate">日付を選択</div>
      <div class="sb-day-name" id="sbDayName">クリックして詳細を表示</div>
    </div>
    <div class="sb-events" id="sbEvents">
      <div class="no-events"><div class="no-events-icon">📚</div>日付を選択してください</div>
    </div>
    <button class="add-ev-btn" id="addEvBtn">＋ イベント追加</button>
    <div class="legend">
      <div class="legend-title">凡例</div>
      <div class="leg-item"><div class="leg-dot" style="background:#7dd3fc"></div>研修 / Training</div>
      <div class="leg-item"><div class="leg-dot" style="background:#fdba74"></div>監査 / Audit</div>
      <div class="leg-item"><div class="leg-dot" style="background:#86efac"></div>訓練 / Drill</div>
      <div class="leg-item"><div class="leg-dot" style="background:#c4b5fd"></div>会議 / Meeting</div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">イベント追加</span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">日付</label>
        <input type="date" class="form-input" id="fDate">
      </div>
      <div class="form-group">
        <label class="form-label">イベント名</label>
        <input type="text" class="form-input" id="fTitle" placeholder="例: 安全教育">
      </div>
      <div class="form-group">
        <label class="form-label">種別</label>
        <select class="form-select" id="fType">
          <option value="training">研修 / Training</option>
          <option value="audit">監査 / Audit</option>
          <option value="drill">訓練 / Drill</option>
          <option value="meeting">会議 / Meeting</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" id="btnCancel">キャンセル</button>
      <button class="btn-save" id="btnSave">保存</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'optec_training_cal';
const MONTHS_JA = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DAYS_JA = ['日','月','火','水','木','金','土'];
const TYPE_LABELS = {training:'研修',audit:'監査',drill:'訓練',meeting:'会議'};

let events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let curYear, curMonth, selectedKey = null;
const today = new Date();

function pad(n){return String(n).padStart(2,'0')}
function dateKey(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`}

function getNthWeekday(y, m, weekday, nth){
  // weekday: 0=Sun,1=Mon,...,5=Fri,6=Sat
  let count=0;
  const days = new Date(y,m+1,0).getDate();
  for(let d=1;d<=days;d++){
    if(new Date(y,m,d).getDay()===weekday){
      count++;
      if(count===nth) return d;
    }
  }
  return null;
}

function getLastWeekday(y, m, weekday){
  const days = new Date(y,m+1,0).getDate();
  for(let d=days;d>=1;d--){
    if(new Date(y,m,d).getDay()===weekday) return d;
  }
  return null;
}

function buildDefaults(){
  const y = today.getFullYear();
  const m = today.getMonth();

  function add(day, title, type){
    if(!day) return;
    const k = dateKey(y,m,day);
    if(!events[k]) events[k]=[];
    if(!events[k].find(e=>e.title===title)) events[k].push({id:Date.now()+Math.random(),title,type});
  }

  // 2nd Tuesday: 安全衛生委員会
  add(getNthWeekday(y,m,2,2), '安全衛生委員会', 'meeting');
  add(10, 'ISO 9001内部監査', 'audit');
  add(15, 'コンプライアンス研修', 'training');
  // Last Friday: 緊急対応訓練
  add(getLastWeekday(y,m,5), '緊急対応訓練', 'drill');

  // Quarterly IATA DGR — months 0,3,6,9
  if([0,3,6,9].includes(m)){
    add(20, 'IATA DGR危険物研修', 'training');
  }

  // 1st Monday: 新入社員オリエンテーション (Jan/Apr/Jul/Oct)
  if([0,3,6,9].includes(m)){
    add(getNthWeekday(y,m,1,1), '新入社員オリエンテーション', 'training');
  }

  // Next month
  const nm=(m+1)%12, ny=m===11?y+1:y;
  function addN(day,title,type){
    if(!day) return;
    const k=dateKey(ny,nm,day);
    if(!events[k]) events[k]=[];
    if(!events[k].find(e=>e.title===title)) events[k].push({id:Date.now()+Math.random(),title,type});
  }
  addN(getNthWeekday(ny,nm,2,2), '安全衛生委員会', 'meeting');
  addN(10, 'ISO 9001内部監査', 'audit');
  addN(15, 'コンプライアンス研修', 'training');
  addN(getLastWeekday(ny,nm,5), '緊急対応訓練', 'drill');
  if([0,3,6,9].includes(nm)){
    addN(20, 'IATA DGR危険物研修', 'training');
    addN(getNthWeekday(ny,nm,1,1), '新入社員オリエンテーション', 'training');
  }

  save();
}

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(events))}

function render(){
  const y=curYear, m=curMonth;
  document.getElementById('monthLabel').textContent=`${y}年 ${MONTHS_JA[m]}`;
  const firstDow=(new Date(y,m,1).getDay()+6)%7;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const grid=document.getElementById('daysGrid');
  grid.innerHTML='';

  for(let i=0;i<42;i++){
    const cell=document.createElement('div');
    cell.className='day';
    let d,dm,dy,isOther=false;
    if(i<firstDow){d=prevDays-firstDow+1+i;dm=m-1<0?11:m-1;dy=m-1<0?y-1:y;isOther=true;}
    else if(i>=firstDow+daysInMonth){d=i-firstDow-daysInMonth+1;dm=m+1>11?0:m+1;dy=m+1>11?y+1:y;isOther=true;}
    else{d=i-firstDow+1;dm=m;dy=y;}
    const key=dateKey(dy,dm,d);
    if(isOther) cell.classList.add('other-month');
    if(dy===today.getFullYear()&&dm===today.getMonth()&&d===today.getDate()) cell.classList.add('today');
    if(key===selectedKey) cell.classList.add('selected');

    const num=document.createElement('div');
    num.className='day-num';num.textContent=d;
    cell.appendChild(num);

    const evs=events[key]||[];
    evs.slice(0,2).forEach(ev=>{
      const chip=document.createElement('div');
      chip.className=`event-chip et-${ev.type}`;
      chip.textContent=ev.title;
      cell.appendChild(chip);
    });
    if(evs.length>2){
      const more=document.createElement('div');
      more.className='more-chip';more.textContent=`+${evs.length-2} more`;
      cell.appendChild(more);
    }

    const addBtn=document.createElement('button');
    addBtn.className='add-day-btn';addBtn.textContent='+';
    addBtn.addEventListener('click',e=>{e.stopPropagation();openModal(key)});
    cell.appendChild(addBtn);
    cell.addEventListener('click',()=>selectDay(key,dy,dm,d));
    grid.appendChild(cell);
  }
}

function selectDay(key,y,m,d){
  selectedKey=key;render();
  const dow=new Date(y,m,d).getDay();
  document.getElementById('sbDate').textContent=`${y}年${m+1}月${d}日（${DAYS_JA[dow]}）`;
  document.getElementById('sbDayName').textContent=`${MONTHS_JA[m]} ${d}`;
  renderSidebar(key);
}

function renderSidebar(key){
  const sb=document.getElementById('sbEvents');
  const evs=events[key]||[];
  if(evs.length===0){sb.innerHTML='<div class="no-events"><div class="no-events-icon">✨</div>この日はイベントなし</div>';return;}
  sb.innerHTML='';
  evs.forEach(ev=>{
    const card=document.createElement('div');
    card.className=`ev-card et-${ev.type}`;
    card.innerHTML=`<div class="ev-title">${ev.title}</div><div class="ev-type">${TYPE_LABELS[ev.type]||ev.type}</div>
    <button class="ev-del" title="削除">✕</button>`;
    card.querySelector('.ev-del').addEventListener('click',()=>deleteEvent(key,ev.id));
    sb.appendChild(card);
  });
}

function deleteEvent(key,id){
  if(!confirm('このイベントを削除しますか？')) return;
  events[key]=(events[key]||[]).filter(e=>e.id!==id);
  if(events[key].length===0) delete events[key];
  save();render();
  if(selectedKey===key) renderSidebar(key);
}

function openModal(preKey){
  document.getElementById('fDate').value=preKey||selectedKey||`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  document.getElementById('fTitle').value='';
  document.getElementById('fType').value='training';
  document.getElementById('modalBg').classList.add('show');
  setTimeout(()=>document.getElementById('fTitle').focus(),50);
}
function closeModal(){document.getElementById('modalBg').classList.remove('show')}
function saveEvent(){
  const dateVal=document.getElementById('fDate').value;
  const title=document.getElementById('fTitle').value.trim();
  const type=document.getElementById('fType').value;
  if(!dateVal||!title) return;
  if(!events[dateVal]) events[dateVal]=[];
  events[dateVal].push({id:Date.now(),title,type});
  save();render();
  if(selectedKey===dateVal) renderSidebar(dateVal);
  closeModal();
}

document.getElementById('prevBtn').addEventListener('click',()=>{curMonth--;if(curMonth<0){curMonth=11;curYear--;}render()});
document.getElementById('nextBtn').addEventListener('click',()=>{curMonth++;if(curMonth>11){curMonth=0;curYear++;}render()});
document.getElementById('todayBtn').addEventListener('click',()=>{
  curYear=today.getFullYear();curMonth=today.getMonth();
  const k=dateKey(curYear,curMonth,today.getDate());
  selectDay(k,curYear,curMonth,today.getDate());
});
document.getElementById('addEvBtn').addEventListener('click',()=>openModal(null));
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('btnCancel').addEventListener('click',closeModal);
document.getElementById('btnSave').addEventListener('click',saveEvent);
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
document.getElementById('fTitle').addEventListener('keydown',e=>{if(e.key==='Enter')saveEvent()});

curYear=today.getFullYear();curMonth=today.getMonth();
buildDefaults();render();
const tk=dateKey(curYear,curMonth,today.getDate());
selectDay(tk,curYear,curMonth,today.getDate());
</script>
</body>
</html>
