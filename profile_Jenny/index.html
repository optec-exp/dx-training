<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自我介绍 — Jenny</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Hiragino Sans", "Microsoft YaHei", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a3a5c;
      color: white;
      padding: 16px 32px;
      font-size: 14px;
      letter-spacing: 1px;
    }

    header span {
      opacity: 0.7;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 560px;
      width: 100%;
      overflow: hidden;
    }

    .card-top {
      background: linear-gradient(135deg, #1a3a5c 0%, #2e6da4 100%);
      padding: 48px 32px 32px;
      text-align: center;
      color: white;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 20px;
      border: 3px solid rgba(255,255,255,0.5);
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-top h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .role-badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .card-body {
      padding: 32px;
    }

    .section {
      margin-bottom: 28px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section h2 {
      font-size: 11px;
      font-weight: 700;
      color: #2e6da4;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section h2::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e8eef4;
    }

    .section p {
      font-size: 15px;
      color: #334155;
      line-height: 1.8;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #e8eef4;
      color: #1a3a5c;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <header>
    <span>OPTEC AI Academy — 60天训练营 / 作品 01</span>
  </header>

  <main>
    <div class="card">
      <div class="card-top">
        <div class="avatar"><img src="头像照片.jpg" alt="Jenny"></div>
        <h1>Jenny</h1>
        <span class="role-badge">管理部部长</span>
      </div>

      <div class="card-body">
        <div class="section">
          <h2>自我介绍</h2>
          <p>大家好，我是 Jenny。</p>
        </div>

        <div class="section">
          <h2>训练营目标</h2>
          <p>希望通过这次训练营提升管理能力，也多和大家交流学习，让工作做得更高效。</p>
        </div>

        <div class="section">
          <h2>担当</h2>
          <div class="tag-list">
            <span class="tag">管理部</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    OPTEC AI Academy &copy; 2026
  </footer>

</body>
</html>
