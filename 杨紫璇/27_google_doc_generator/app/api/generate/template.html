<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    font-size: 11pt;
    color: #1a1a1a;
    background: #fff;
    padding: 40px 60px;
    line-height: 1.8;
  }
  .header {
    border-bottom: 3px solid #1a3a5c;
    padding-bottom: 16px;
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .company { font-size: 16pt; font-weight: bold; color: #1a3a5c; letter-spacing: 0.08em; }
  .doc-date { font-size: 10pt; color: #555; }
  .title-block { text-align: center; margin: 24px 0 32px; }
  .doc-title {
    font-size: 16pt; font-weight: bold; color: #1a3a5c;
    border-bottom: 2px solid #1a3a5c;
    display: inline-block; padding-bottom: 6px; letter-spacing: 0.1em;
  }
  .meta-table { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
  .meta-table td {
    padding: 7px 14px;
    border: 1px solid #ccc;
    font-size: 10.5pt;
  }
  .meta-table td:first-child {
    width: 130px;
    background: #eef2f7;
    font-weight: bold;
    color: #1a3a5c;
  }
  .section-label {
    font-size: 10.5pt; font-weight: bold; color: #1a3a5c;
    background: #eef2f7;
    border-left: 4px solid #1a3a5c;
    padding: 6px 12px;
    margin: 24px 0 8px;
  }
  .content-box {
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 14px 18px;
    min-height: 120px;
    font-size: 10.5pt;
    white-space: pre-wrap;
    line-height: 1.9;
  }
  .footer {
    margin-top: 40px;
    border-top: 1px solid #ccc;
    padding-top: 12px;
    font-size: 9pt;
    color: #888;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="company">OPTEC EXPRESS INC.</div>
    <div class="doc-date">{{日付}}</div>
  </div>

  <div class="title-block">
    <div class="doc-title">{{件名}}</div>
  </div>

  <table class="meta-table">
    <tr>
      <td>顧客名</td>
      <td>{{顧客名}}</td>
    </tr>
    <tr>
      <td>案件番号</td>
      <td>{{案件番号}}</td>
    </tr>
    <tr>
      <td>AWB番号</td>
      <td>{{AWB番号}}</td>
    </tr>
    <tr>
      <td>担当者名</td>
      <td>{{担当者名}}</td>
    </tr>
  </table>

  <div class="section-label">内容</div>
  <div class="content-box">{{内容}}</div>

  <div class="footer">
    OPTEC EXPRESS INC. &nbsp;|&nbsp; 本書は自動生成されたドキュメントです
  </div>
</body>
</html>
