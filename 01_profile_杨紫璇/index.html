<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>杨紫璇 · 个人介绍</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* 背景光晕 */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.15), transparent 70%);
      top: -100px;
      left: -100px;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.1), transparent 70%);
      bottom: -80px;
      right: -80px;
    }

    .container {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 860px;
      width: 90%;
      min-height: 520px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 40px 120px rgba(0,0,0,0.6);
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 左侧照片面板 */
    .left-panel {
      position: relative;
      overflow: hidden;
    }
    .left-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .left-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        transparent 60%,
        #0a0a0f 100%
      );
    }
    .left-overlay {
      position: absolute;
      bottom: 28px;
      left: 24px;
      z-index: 2;
    }
    .left-overlay .en-name {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    /* 右侧内容面板 */
    .right-panel {
      background: #0d0d15;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #8b5cf6;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .name {
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .role {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 36px;
      padding-bottom: 36px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .bio {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      line-height: 2;
      margin-bottom: 36px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 40px;
    }

    .tag {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      padding: 6px 16px;
      border-radius: 20px;
      background: rgba(139, 92, 246, 0.12);
      border: 1px solid rgba(139, 92, 246, 0.3);
      transition: all 0.2s;
    }
    .tag:hover {
      background: rgba(139, 92, 246, 0.25);
      border-color: rgba(139, 92, 246, 0.6);
      color: #fff;
    }

    .footer-line {
      font-size: 11px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 1px;
    }

    /* 装饰线 */
    .deco-line {
      width: 36px;
      height: 2px;
      background: linear-gradient(90deg, #8b5cf6, #ec4899);
      border-radius: 2px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <div class="container">

    <!-- 左侧：照片 -->
    <div class="left-panel">
      <img src="photo.jpg" alt="杨紫璇">
      <div class="left-overlay">
        <p class="en-name">Yang Zixuan</p>
      </div>
    </div>

    <!-- 右侧：内容 -->
    <div class="right-panel">

      <p class="label">Personal Profile</p>
      <div class="deco-line"></div>

      <h1 class="name">杨紫璇</h1>
      <p class="role">治理室 · 高级员工</p>

      <p class="bio">
        你好，我是杨紫璇。<br>
        专注于治理工作，热爱生活中的每一处细节。<br>
        期待与你相识。
      </p>

      <p class="section-label">Interests</p>
      <div class="tags">
        <span class="tag">🎌 看动漫</span>
      </div>

      <p class="footer-line">optec-ai-academy · 2026</p>

    </div>
  </div>

</body>
</html>
