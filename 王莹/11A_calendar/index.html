<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月度结算日历</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #FFF9F0;
      font-family: 'Inter', 'Microsoft YaHei', sans-serif;
      color: #3a2a2a;
      min-height: 100vh;
      padding: 20px 16px;
    }

    .container {
      max-width: 100%;
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    /* ── 左侧日历 ── */
    .calendar-wrap { flex: 1; min-width: 0; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 700;
      color: #A66D6D;
      letter-spacing: 0.5px;
    }
    .header h1 span { color: #B28B8B; font-weight: 400; font-size: 14px; margin-left: 8px; }
    .nav { display: flex; align-items: center; gap: 10px; }
    .nav button {
      background: #fff;
      color: #A66D6D;
      border: 1.5px solid #E8BFBF;
      width: 34px; height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.15s;
      box-shadow: 0 1px 4px rgba(166,109,109,0.08);
    }
    .nav button:hover { background: #A66D6D; color: #fff; border-color: #A66D6D; }
    .month-label {
      font-size: 16px; font-weight: 700;
      color: #A66D6D;
      min-width: 120px;
      text-align: center;
    }

    /* 图例 */
    .legend {
      display: flex; gap: 14px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: #9ca3af;
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* 日历主体 */
    .calendar {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(166,109,109,0.08);
      border: 1px solid #E8BFBF;
    }
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: linear-gradient(135deg, #A66D6D, #C49090);
    }
    .weekday {
      text-align: center;
      padding: 12px 0;
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.85);
      letter-spacing: 1.5px;
    }
    .weekday.weekend { color: #fde68a; }

    .days { display: grid; grid-template-columns: repeat(7, 1fr); }

    .day {
      min-height: 100px;
      padding: 8px 7px;
      border-right: 1px solid #F5E8E8;
      border-bottom: 1px solid #F5E8E8;
      cursor: pointer;
      transition: background 0.12s;
    }
    .day:nth-child(7n) { border-right: none; }
    .day:hover { background: #FFF9F0; }
    .day.empty { background: #FFFBF5; cursor: default; }
    .day.empty:hover { background: #FFFBF5; }
    .day.weekend-day { background: #FFF8F0; }
    .day.today {
      background: #edfaf3;
      box-shadow: inset 0 0 0 2px #A66D6D;
    }

    .day-num {
      font-size: 13px; font-weight: 600;
      color: #6b7280;
      display: inline-flex;
      align-items: center; justify-content: center;
      width: 26px; height: 26px;
      border-radius: 50%;
      margin-bottom: 4px;
    }
    .day.today .day-num {
      background: linear-gradient(135deg, #A66D6D, #C49090);
      color: #fff;
    }
    .day.weekend-day .day-num { color: #f87171; }

    .task {
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 4px;
      margin-top: 2px;
      line-height: 1.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task.deadline { background: #fef2f2; color: #dc2626; border-left: 2px solid #f87171; }
    .task.payment  { background: #f0fdf4; color: #16a34a; border-left: 2px solid #4ade80; }
    .task.reminder { background: #fffbeb; color: #d97706; border-left: 2px solid #fbbf24; }
    .task.monthend { background: #FFF9F0; color: #A66D6D; border-left: 2px solid #C49090; }
    .task.iata     { background: #f5f3ff; color: #6d28d9; border-left: 2px solid #a78bfa; }
    .task.note     { background: #eff6ff; color: #2563eb; border-left: 2px solid #60a5fa; }

    /* ── 右侧边栏 ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panel {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 24px rgba(166,109,109,0.08);
      border: 1px solid #E8BFBF;
    }
    .panel-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: #B28B8B;
      margin-bottom: 14px;
    }

    /* 备注面板 */
    .note-date-label {
      font-size: 13px; color: #9ca3af;
      margin-bottom: 10px;
    }
    .note-date-label span { font-weight: 600; color: #A66D6D; }
    .note-textarea {
      width: 100%;
      background: #FFF9F0;
      border: 1.5px solid #E8BFBF;
      border-radius: 10px;
      color: #3d2d40;
      font-size: 13px;
      padding: 10px;
      resize: none;
      height: 90px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .note-textarea:focus { border-color: #a855f7; }
    .note-btns {
      display: flex; gap: 8px;
      margin-top: 10px;
    }
    .note-btns button {
      flex: 1;
      padding: 7px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-save   { background: #A66D6D; color: #fff; }
    .btn-save:hover { background: #8a5a5a; }
    .btn-delete { background: #fef2f2; color: #dc2626; }
    .btn-delete:hover { background: #fee2e2; }

    /* 汇总面板 */
    .summary-list { display: flex; flex-direction: column; gap: 8px; }
    .summary-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px;
      background: #FFF9F0;
      border-radius: 10px;
    }
    .summary-date {
      font-size: 12px; font-weight: 700;
      color: #A66D6D;
      min-width: 36px;
    }
    .summary-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .summary-label { font-size: 12px; color: #6b7280; }
    .empty-summary { font-size: 12px; color: #d1d5db; text-align: center; padding: 12px 0; }

    /* 倒计时 */
    .countdown-item {
      background: #FFF9F0;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .countdown-item:last-child { margin-bottom: 0; }
    .countdown-name {
      font-size: 12px; color: #64748b;
      margin-bottom: 6px;
    }
    .countdown-days {
      font-size: 28px; font-weight: 700;
      color: #A66D6D;
      line-height: 1;
    }
    .countdown-days span { font-size: 13px; font-weight: 400; color: #94a3b8; margin-left: 4px; }
    .countdown-date { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .countdown-today {
      background: #fff3cd;
    }
    .countdown-today .countdown-days { color: #d97706; }

    /* 弹窗通用 */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-bg.show { display: flex; }
    .modal {
      background: #FFF9F0;
      border: 1px solid #E8BFBF;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(166,109,109,0.15);
    }
    .modal h3 { font-size: 15px; color: #3a2a2a; margin-bottom: 16px; }
    .modal textarea {
      width: 100%;
      background: #fff;
      border: 1.5px solid #E8BFBF;
      border-radius: 8px;
      color: #3a2a2a;
      font-size: 13px;
      padding: 10px;
      resize: none;
      height: 100px;
      outline: none;
      font-family: inherit;
    }
    .modal textarea:focus { border-color: #A66D6D; }
    .modal-btns {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }
    .modal-btns button {
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-cancel { background: #E8BFBF; color: #6b7280; }
    .btn-delete { background: #fef2f2; color: #dc2626; }

    /* 设置弹窗 */
    .settings-modal { width: 320px; }
    .settings-modal-title {
      font-size: 15px; font-weight: 700;
      color: #3a2a2a;
      margin-bottom: 20px;
      text-align: center;
    }
    .settings-items { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
    .settings-item {
      background: #FFF9F0;
      border: 1px solid #E8BFBF;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .settings-item-label { font-size: 13px; color: #6b7280; }
    .picker-wrap { position: relative; }
    .day-picker {
      appearance: none;
      -webkit-appearance: none;
      background: #fff;
      border: 1.5px solid #E8BFBF;
      border-radius: 8px;
      color: #A66D6D;
      font-size: 14px;
      font-weight: 600;
      padding: 6px 28px 6px 12px;
      cursor: pointer;
      outline: none;
      font-family: inherit;
      min-width: 80px;
      text-align: center;
    }
    .day-picker:focus { border-color: #A66D6D; }
    .picker-wrap::after {
      content: '▾';
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      color: #B28B8B;
      pointer-events: none;
      font-size: 12px;
    }
    .settings-item-multi { flex-direction: column; align-items: flex-start; gap: 8px; }
    .multi-wrap { width: 100%; }
    .multi-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; min-height: 10px; }
    .multi-tag {
      background: #fff;
      border: 1px solid #E8BFBF;
      border-radius: 20px;
      padding: 3px 10px 3px 12px;
      font-size: 12px; color: #A66D6D;
      display: flex; align-items: center; gap: 6px;
    }
    .multi-tag-del {
      cursor: pointer; color: #B28B8B;
      font-size: 14px; line-height: 1;
    }
    .multi-tag-del:hover { color: #dc2626; }
    .multi-add-row { display: flex; gap: 8px; align-items: center; }
    .day-picker-sm { min-width: 110px; }
    .add-tag-btn {
      background: #A66D6D; color: #fff;
      border: none; border-radius: 8px;
      width: 32px; height: 32px;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .add-tag-btn:hover { background: #8a5a5a; }
  </style>
</head>
<body>

  <div class="container">

    <!-- 左侧日历 -->
    <div class="calendar-wrap">

      <div class="header">
        <h1>月度结算日历 <span>点击日期添加备注</span></h1>
        <div class="nav">
          <button onclick="changeMonth(-1)">&#8592;</button>
          <div class="month-label" id="monthLabel"></div>
          <button onclick="changeMonth(1)">&#8594;</button>
          <button onclick="openSettings()" title="设置本月日期" style="font-size:16px">⚙️</button>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>截止日</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div>付款日</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>财务结算日</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>IATA账单/扣款</div>
        <div class="legend-item"><div class="legend-dot" style="background:#C49090"></div>月末付款日</div>
        <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div>备注</div>
      </div>


      <div class="calendar">
        <div class="weekdays">
          <div class="weekday weekend">日</div>
          <div class="weekday">一</div>
          <div class="weekday">二</div>
          <div class="weekday">三</div>
          <div class="weekday">四</div>
          <div class="weekday">五</div>
          <div class="weekday weekend">六</div>
        </div>
        <div class="days" id="days"></div>
      </div>

    </div>

    <!-- 右侧边栏 -->
    <div class="sidebar">

      <!-- 备注面板 -->
      <div class="panel">
        <div class="panel-title">📝 日期备注</div>
        <div class="note-date-label" id="noteDateLabel">请点击左侧日期</div>
        <textarea class="note-textarea" id="noteInput" placeholder="输入备注内容…"></textarea>
        <div class="note-btns">
          <button class="btn-delete" id="btnDelete" onclick="deleteNote()" style="display:none">删除</button>
          <button class="btn-save" onclick="saveNote()">保存</button>
        </div>
      </div>

      <!-- 汇总面板 -->
      <div class="panel">
        <div class="panel-title">📋 本月任务汇总</div>
        <div class="summary-list" id="summaryList"></div>
      </div>

      <!-- 倒计时面板 -->
      <div class="panel">
        <div class="panel-title">⏰ 下一个节点</div>
        <div id="countdown"></div>
      </div>

    </div>

  </div>

  <!-- 设置弹窗（body级别，保证居中显示）-->
  <div class="modal-bg" id="settingsBg">
    <div class="modal settings-modal">
      <div class="settings-modal-title" id="settingsTitle"></div>
      <div class="settings-items">
        <!-- 财务结算日：单日 -->
        <div class="settings-item">
          <div class="settings-item-label">📊 财务结算日</div>
          <div class="picker-wrap">
            <select class="day-picker" id="s-jiesuan">
              <option value="">— 未设置 —</option>
            </select>
          </div>
        </div>
        <!-- IATA账单日：多日 -->
        <div class="settings-item settings-item-multi">
          <div class="settings-item-label">📄 IATA 账单日</div>
          <div class="multi-wrap">
            <div class="multi-tags" id="tags-zhangdan"></div>
            <div class="multi-add-row">
              <select class="day-picker day-picker-sm" id="s-zhangdan">
                <option value="">选择日期</option>
              </select>
              <button class="add-tag-btn" onclick="addTag('zhangdan')">＋</button>
            </div>
          </div>
        </div>
        <!-- IATA扣款日：多日 -->
        <div class="settings-item settings-item-multi">
          <div class="settings-item-label">💳 IATA 扣款日</div>
          <div class="multi-wrap">
            <div class="multi-tags" id="tags-koukuan"></div>
            <div class="multi-add-row">
              <select class="day-picker day-picker-sm" id="s-koukuan">
                <option value="">选择日期</option>
              </select>
              <button class="add-tag-btn" onclick="addTag('koukuan')">＋</button>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeSettings()">取消</button>
        <button class="btn-save" onclick="saveSettings()">保存</button>
      </div>
    </div>
  </div>

  <script>
    const today = new Date();
    let year  = today.getFullYear();
    let month = today.getMonth();
    let selectedDate = null;

    function settingsKey(y, m) { return `settings_${y}_${m}`; }
    function getSettings(y, m) {
      const s = localStorage.getItem(settingsKey(y, m));
      return s ? JSON.parse(s) : {};
    }
    function saveSettingsData(y, m, data) {
      localStorage.setItem(settingsKey(y, m), JSON.stringify(data));
    }

    // 初始化日期选择器选项（1-31）
    ['s-jiesuan','s-zhangdan','s-koukuan'].forEach(id => {
      const sel = document.getElementById(id);
      for (let d = 1; d <= 31; d++) {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = `${d} 日`;
        sel.appendChild(opt);
      }
    });

    // 多日期标签管理
    let tempTags = { zhangdan: [], koukuan: [] };

    function renderTags(key) {
      const container = document.getElementById(`tags-${key}`);
      container.innerHTML = tempTags[key].sort((a,b)=>a-b).map(d => `
        <div class="multi-tag">
          ${d} 日
          <span class="multi-tag-del" onclick="removeTag('${key}',${d})">×</span>
        </div>`).join('');
    }

    function addTag(key) {
      const val = parseInt(document.getElementById(`s-${key}`).value);
      if (!val) return;
      if (!tempTags[key].includes(val)) {
        tempTags[key].push(val);
        renderTags(key);
      }
      document.getElementById(`s-${key}`).value = '';
    }

    function removeTag(key, d) {
      tempTags[key] = tempTags[key].filter(v => v !== d);
      renderTags(key);
    }

    function openSettings() {
      const s = getSettings(year, month);
      document.getElementById('settingsTitle').textContent =
        `${year}年 ${month + 1}月 日期设置`;
      document.getElementById('s-jiesuan').value = s.jiesuan || '';
      tempTags.zhangdan = Array.isArray(s.zhangdan) ? s.zhangdan : [];
      tempTags.koukuan  = Array.isArray(s.koukuan)  ? s.koukuan  : [];
      renderTags('zhangdan');
      renderTags('koukuan');
      document.getElementById('settingsBg').classList.add('show');
    }
    function closeSettings() {
      document.getElementById('settingsBg').classList.remove('show');
    }
    function saveSettings() {
      const jiesuan = parseInt(document.getElementById('s-jiesuan').value) || null;
      saveSettingsData(year, month, {
        jiesuan,
        zhangdan: tempTags.zhangdan,
        koukuan:  tempTags.koukuan,
      });
      closeSettings();
      render();
      renderCountdown();
    }

    function prevWorkday(y, m, d) {
      const date = new Date(y, m, d);
      while (date.getDay() === 0 || date.getDay() === 6) date.setDate(date.getDate() - 1);
      return date.getDate();
    }
    function nextWorkday(y, m, d) {
      const date = new Date(y, m, d);
      while (date.getDay() === 0 || date.getDay() === 6) date.setDate(date.getDate() + 1);
      return date.getDate();
    }

    function noteKey(y, m, d) { return `note_${y}_${m}_${d}`; }
    function getNote(y, m, d) { return localStorage.getItem(noteKey(y, m, d)) || ''; }
    function setNote(y, m, d, text) { localStorage.setItem(noteKey(y, m, d), text); }
    function removeNote(y, m, d) { localStorage.removeItem(noteKey(y, m, d)); }

    function selectDay(y, m, d) {
      selectedDate = { y, m, d };
      const note = getNote(y, m, d);
      document.getElementById('noteDateLabel').innerHTML =
        `<span>${y}年${m + 1}月${d}日</span>`;
      document.getElementById('noteInput').value = note;
      document.getElementById('noteInput').disabled = false;
      document.getElementById('btnDelete').style.display = note ? 'inline-block' : 'none';
      render();
    }

    function saveNote() {
      if (!selectedDate) return;
      const text = document.getElementById('noteInput').value.trim();
      if (text) setNote(selectedDate.y, selectedDate.m, selectedDate.d, text);
      else removeNote(selectedDate.y, selectedDate.m, selectedDate.d);
      document.getElementById('btnDelete').style.display = text ? 'inline-block' : 'none';
      render();
    }

    function deleteNote() {
      if (!selectedDate) return;
      removeNote(selectedDate.y, selectedDate.m, selectedDate.d);
      document.getElementById('noteInput').value = '';
      document.getElementById('btnDelete').style.display = 'none';
      render();
    }

    function changeMonth(delta) {
      month += delta;
      if (month > 11) { month = 0; year++; }
      if (month < 0)  { month = 11; year--; }
      render();
    }

    function render() {
      document.getElementById('monthLabel').textContent = `${year}年 ${month + 1}月`;

      const firstDay    = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      const actualDay10  = nextWorkday(year, month, 10);
      const actualDay15  = prevWorkday(year, month, 15);
      const actualDay25  = prevWorkday(year, month, 25);
      const s = getSettings(year, month);
      const actualIata      = s.jiesuan  ? prevWorkday(year, month, s.jiesuan) : null;
      const actualZhangdans = (Array.isArray(s.zhangdan) ? s.zhangdan : []).map(d => prevWorkday(year, month, d));
      const actualKoukuans  = (Array.isArray(s.koukuan)  ? s.koukuan  : []).map(d => prevWorkday(year, month, d));

      let html = '';
      let summaryItems = [];

      for (let i = 0; i < firstDay; i++) html += '<div class="day empty"></div>';

      for (let d = 1; d <= daysInMonth; d++) {
        const dow = new Date(year, month, d).getDay();
        const isWeekend = dow === 0 || dow === 6;
        const isToday   = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
        const isSelected = selectedDate && selectedDate.y === year && selectedDate.m === month && selectedDate.d === d;
        const note = getNote(year, month, d);

        const dayTasks = [];
        if (d === actualDay10) dayTasks.push({ type: 'payment',  label: '月初付款日',      color: '#4ade80' });
        if (d === actualDay15) dayTasks.push({ type: 'deadline', label: '个税申报 / 发工资', color: '#f87171' });
        if (d === actualDay25) dayTasks.push({ type: 'deadline', label: '社保公积金截止',    color: '#f87171' });
        if (actualIata     && d === actualIata)     dayTasks.push({ type: 'reminder', label: '财务结算日',  color: '#fbbf24' });
        if (actualZhangdans.includes(d)) dayTasks.push({ type: 'iata', label: 'IATA账单日', color: '#a78bfa' });
        if (actualKoukuans.includes(d))  dayTasks.push({ type: 'iata', label: 'IATA扣款日', color: '#a78bfa' });
        if (!isWeekend && d >= 20) dayTasks.push({ type: 'monthend', label: '月末付款日', color: '#C49090' });
        if (note) dayTasks.push({ type: 'note', label: note, color: '#60a5fa' });

        dayTasks.filter(t => t.type !== 'monthend' && t.type !== 'note')
          .forEach(t => summaryItems.push({ d, ...t }));

        const taskHtml = dayTasks.map(t =>
          `<div class="task ${t.type}">${t.label}</div>`
        ).join('');

        const cls = ['day',
          isToday    ? 'today'       : '',
          isWeekend  ? 'weekend-day' : '',
          isSelected ? 'today'       : '',
        ].filter(Boolean).join(' ');

        html += `
          <div class="${cls}" onclick="selectDay(${year},${month},${d})">
            <div class="day-num">${d}</div>
            ${taskHtml}
          </div>`;
      }

      document.getElementById('days').innerHTML = html;

      summaryItems.sort((a, b) => a.d - b.d);
      const labelMap = { deadline: '截止', payment: '付款', reminder: '结算' };
      document.getElementById('summaryList').innerHTML = summaryItems.length
        ? summaryItems.map(item => `
            <div class="summary-item">
              <div class="summary-date">${month + 1}/${item.d}</div>
              <div class="summary-dot" style="background:${item.color}"></div>
              <div class="summary-label">${item.label}</div>
            </div>`).join('')
        : '<div class="empty-summary">本月暂无任务</div>';
    }

    function renderCountdown() {
      const now = new Date();
      const y = now.getFullYear();
      const m = now.getMonth();

      const a10  = nextWorkday(y, m, 10);
      const a15  = prevWorkday(y, m, 15);
      const a25  = prevWorkday(y, m, 25);
      const cs   = getSettings(y, m);
      const aIata     = cs.jiesuan  ? prevWorkday(y, m, cs.jiesuan)  : null;
      const aZhangdans = (Array.isArray(cs.zhangdan) ? cs.zhangdan : []).map(d => prevWorkday(y, m, d));
      const aKoukuans  = (Array.isArray(cs.koukuan)  ? cs.koukuan  : []).map(d => prevWorkday(y, m, d));

      const nodes = [
        { label: '月初付款日',        day: a10 },
        { label: '个税申报 / 发工资',  day: a15 },
        { label: '社保公积金截止',     day: a25 },
      ];
      if (aIata)     nodes.push({ label: '财务结算日', day: aIata });
      aZhangdans.forEach(d => nodes.push({ label: 'IATA账单日', day: d }));
      aKoukuans.forEach(d  => nodes.push({ label: 'IATA扣款日', day: d }));
      nodes.sort((a, b) => a.day - b.day);

      const todayNum = now.getDate();
      const upcoming = nodes.filter(n => n.day >= todayNum).slice(0, 2);

      if (!upcoming.length) {
        document.getElementById('countdown').innerHTML =
          '<div style="font-size:12px;color:#94a3b8;text-align:center;padding:8px 0">本月节点已全部完成 🎉</div>';
        return;
      }

      document.getElementById('countdown').innerHTML = upcoming.map(n => {
        const diff = n.day - todayNum;
        const isToday = diff === 0;
        return `
          <div class="countdown-item ${isToday ? 'countdown-today' : ''}">
            <div class="countdown-name">${n.label}</div>
            <div class="countdown-days">
              ${isToday ? '今天' : diff}<span>${isToday ? '⚠️ 今日截止' : ' 天后'}</span>
            </div>
            <div class="countdown-date">${y}年${m + 1}月${n.day}日</div>
          </div>`;
      }).join('');
    }

    selectDay(today.getFullYear(), today.getMonth(), today.getDate());
    renderCountdown();
  </script>

</body>
</html>
