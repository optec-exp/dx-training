<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TALA Network — Global Coverage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0f2557;
      --blue:    #1a56db;
      --sky:     #e8f0fe;
      --accent:  #f59e0b;
      --bg:      #f8fafc;
      --white:   #ffffff;
      --border:  #e2e8f0;
      --text-hi: #0f172a;
      --text-md: #475569;
      --text-lo: #94a3b8;
    }

    body {
      background: var(--bg);
      color: var(--text-hi);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 顶部标题栏 ── */
    .topbar {
      background: var(--navy);
      padding: 0 32px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 20px; }
    .topbar-brand {
      font-size: 15px; font-weight: 700;
      color: #fff; letter-spacing: 1px;
    }
    .topbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.2); }
    .topbar-sub { font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 2px; }
    .topbar-stats { display: flex; gap: 28px; }
    .topbar-stat { text-align: right; }
    .topbar-num { font-size: 16px; font-weight: 700; color: var(--accent); line-height: 1; }
    .topbar-label { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

    /* ── 主体布局：左边栏 + 右侧地图 ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 左侧边栏 ── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 11px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--text-lo); margin-bottom: 14px;
    }

    /* 地区筛选 Tab */
    .region-tabs {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .region-tab {
      font-family: 'Inter', sans-serif;
      font-size: 11px; font-weight: 500;
      padding: 5px 12px; border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-md);
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .region-tab .tab-count {
      font-size: 10px; color: var(--text-lo);
    }
    .region-tab:hover { border-color: var(--blue); color: var(--blue); background: var(--sky); }
    .region-tab.active {
      background: var(--blue); color: #fff;
      border-color: var(--blue);
    }
    .region-tab.active .tab-count { color: rgba(255,255,255,0.7); }

    /* 搜索框 */
    .search-wrap {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-input {
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text-hi);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--blue); }
    .search-input::placeholder { color: var(--text-lo); }

    /* 国家列表 */
    .country-list {
      flex: 1;
      overflow-y: auto;
    }
    .country-list::-webkit-scrollbar { width: 4px; }
    .country-list::-webkit-scrollbar-track { background: transparent; }
    .country-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .country-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: default;
    }
    .country-item:hover { background: var(--sky); }
    .country-item-name { font-size: 13px; font-weight: 500; color: var(--text-hi); }
    .country-item-city { font-size: 11px; color: var(--text-lo); }

    .sidebar-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-lo);
      flex-shrink: 0;
    }
    .sidebar-footer span { color: var(--blue); font-weight: 600; }

    /* ── 地图区域 ── */
    .map-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .map-frame {
      width: 100%; height: 100%;
      border: none;
    }

    /* ── 响应式 ── */
    @media (max-width: 768px) {
      body { overflow: auto; height: auto; }
      .main { flex-direction: column; }
      .sidebar { width: 100%; height: auto; }
      .map-area { height: 360px; }
      .country-list { max-height: 400px; }
    }
  </style>
</head>
<body>

  <!-- 顶部标题栏 -->

      <div class="search-wrap">

      { name: "格鲁吉亚", city: "第比利斯", region: "cis" },

      { name: "白俄罗斯", city: "明斯克", region: "cis" },
    ];

    let currentRegion = 'all';

    function render() {
      const keyword = document.getElementById('search').value.trim().toLowerCase();
      const filtered = countries.filter(c => {
        const regionMatch = currentRegion === 'all' || c.region === currentRegion;
        const keywordMatch = !keyword || c.name.includes(keyword) || c.city.includes(keyword);
        return regionMatch && keywordMatch;
      });
      document.getElementById('count').textContent = filtered.length;
      document.getElementById('list').innerHTML = filtered.map(c => `
        <div class="country-item">
          <div class="country-item-name">${c.name}</div>
          <div class="country-item-city">${c.city}</div>
        </div>
      `).join('') || '<div style="padding:20px;color:#94a3b8;font-size:13px;">无匹配结果</div>';
    }

    render();

    document.querySelectorAll('.region-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentRegion = tab.dataset.region;
        render();
      });
    });

    document.getElementById('search').addEventListener('input', render);
  </script>
