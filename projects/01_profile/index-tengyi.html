<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自我介绍 — DX室长</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1.5rem;
      padding: 3rem 3.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #0ea5e9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin: 0 auto 1.5rem;
      border: 3px solid #475569;
    }

    .badge {
      display: inline-block;
      background: #6366f1;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.25rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #334155;
      margin: 2rem 0;
    }

    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #64748b;
      margin-bottom: 0.75rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .tag {
      background: #0f172a;
      border: 1px solid #334155;
      color: #cbd5e1;
      font-size: 0.85rem;
      padding: 0.35rem 0.9rem;
      border-radius: 0.5rem;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }

    .info-row span:first-child {
      font-size: 1rem;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #475569;
    }

    .footer strong {
      color: #6366f1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👤</div>

    <span class="badge">OPTEC AI Academy 第1期</span>

    <h1>DX室長</h1>
    <p class="subtitle">OPTEC Express — Digital Transformation</p>

    <hr class="divider" />

    <p class="section-title">担当领域</p>
    <div class="tags">
      <span class="tag">🚀 DX推进</span>
      <span class="tag">🤖 AI工具导入</span>
      <span class="tag">📦 航空货运</span>
      <span class="tag">🏢 业务效率化</span>
    </div>

    <hr class="divider" />

    <p class="section-title">联系方式</p>
    <div class="info-row">
      <span>✉️</span>
      <span>group-dx@optec-exp.com</span>
    </div>
    <div class="info-row">
      <span>🏢</span>
      <span>OPTEC Express Co., Ltd.</span>
    </div>

    <p class="footer">
      作品 #01 — <strong>OPTEC AI Academy</strong> 60天训练营
    </p>
  </div>
</body>
</html>
